<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain Bike Trails of Utah | Submit a Trail</title>
    <meta name="description" content="Share your favorite mountain bike trail with the Utah biking community.">
    <meta name="author" content="Aaron Morris">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/project.css">
    <script src="scripts/project.js" defer></script>
</head>
<body>
    <header>
        <div class="logo">
            <h1>🚵 Mountain Bike Trails of Utah</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="trails.html">Trails</a></li>
                <li><a href="submit.html" class="active">Submit Trail</a></li>
                <li><a href="log.html">My Trail Log</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Submit a New Trail</h1>
        <p>Know a great trail that's not listed? Share it with the community!</p>

        <form id="trailForm">
            <div class="form-group">
                <label for="trailName">Trail Name <span class="required">*</span></label>
                <input type="text" id="trailName" name="trailName" required placeholder="e.g., Moab Slickrock">
            </div>

            <div class="form-group">
                <label for="location">Location <span class="required">*</span></label>
                <input type="text" id="location" name="location" required placeholder="e.g., Moab, UT">
            </div>

            <div class="form-group">
                <label for="difficulty">Difficulty <span class="required">*</span></label>
                <select id="difficulty" name="difficulty" required>
                    <option value="" disabled selected>Select difficulty...</option>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </div>

            <div class="form-group">
                <label for="length">Length (miles) <span class="required">*</span></label>
                <input type="number" id="length" name="length" step="0.1" required placeholder="e.g., 12.5">
            </div>

            <div class="form-group">
                <label for="elevation">Elevation Gain (feet) <span class="required">*</span></label>
                <input type="number" id="elevation" name="elevation" required placeholder="e.g., 1200">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Tell us about this trail..."></textarea>
            </div>

            <div class="form-group">
                <label for="submitterName">Your Name</label>
                <input type="text" id="submitterName" name="submitterName" placeholder="Optional">
            </div>

            <button type="submit" class="submit-btn">Submit Trail</button>
        </form>

        <div id="formMessage" class="form-message"></div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Aaron Morris | Mountain Bike Trails of Utah</p>
        <p id="lastModified"></p>
        <p><a href="references.html">References</a></p>
    </footer>
</body>
</html>
