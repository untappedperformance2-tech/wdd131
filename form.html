<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form | Aaron Morris</title>
    <meta name="description" content="Product review form for WDD 131 - rate products and share your experience">
    <meta name="author" content="Aaron Morris">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
        <p class="subtitle">Share your experience with our products</p>
    </header>

    <main>
        <form action="review.html" method="get" id="reviewForm">
            <!-- Product Name -->
            <div class="form-group">
                <label for="productName">Product Name <span class="required">*</span></label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <!-- Overall Rating -->
            <div class="form-group">
                <label>Overall Rating <span class="required">*</span></label>
                <div class="rating-group">
                    <label class="rating-option">
                        <input type="radio" name="rating" value="1" required>
                        <span class="star">☆</span> 1
                    </label>
                    <label class="rating-option">
                        <input type="radio" name="rating" value="2" required>
                        <span class="star">☆</span> 2
                    </label>
                    <label class="rating-option">
                        <input type="radio" name="rating" value="3" required>
                        <span class="star">☆</span> 3
                    </label>
                    <label class="rating-option">
                        <input type="radio" name="rating" value="4" required>
                        <span class="star">☆</span> 4
                    </label>
                    <label class="rating-option">
                        <input type="radio" name="rating" value="5" required>
                        <span class="star">☆</span> 5
                    </label>
                </div>
            </div>

            <!-- Date of Installation -->
            <div class="form-group">
                <label for="installDate">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <!-- Useful Features (Checkboxes) -->
            <div class="form-group">
                <label>Useful Features</label>
                <div class="checkbox-group">
                    <label class="checkbox-option">
                        <input type="checkbox" name="features" value="Easy to install">
                        Easy to install
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="features" value="Good documentation">
                        Good documentation
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="features" value="Great support">
                        Great support
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="features" value="Works as advertised">
                        Works as advertised
                    </label>
                    <label class="checkbox-option">
                        <input type="checkbox" name="features" value="Good value for money">
                        Good value for money
                    </label>
                </div>
            </div>

            <!-- Written Review -->
            <div class="form-group">
                <label for="writtenReview">Written Review</label>
                <textarea id="writtenReview" name="writtenReview" rows="5" placeholder="Tell us more about your experience with this product..."></textarea>
            </div>

            <!-- User Name -->
            <div class="form-group">
                <label for="userName">User Name</label>
                <input type="text" id="userName" name="userName" placeholder="Your name (optional)">
            </div>

            <!-- Submit Button -->
            <div class="form-group">
                <button type="submit" class="submit-btn">Submit Review</button>
            </div>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Aaron Morris | Product Review Form</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
