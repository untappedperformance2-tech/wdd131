<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form | Aaron Morris</title>
    <meta name="description" content="Product review form for WDD 131 - rate products and share your experience">
    <meta name="author" content="Aaron Morris">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
        <p class="subtitle">Share your experience with our products</p>
    </header>

    <main>
        <form action="review.html" method="get" id="reviewForm">
            <!-- Product Name -->
            <div class="form-group">
                <label for="productName">Product Name <span class="required">*</span></label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <!-- Overall Rating - EACH radio button now has a unique ID and its own label -->
            <div class="form-group">
                <label class="rating-group-label">Overall Rating <span class="required">*</span></label>
                <div class="rating-group">
                    <div class="rating-option">
                        <input type="radio" id="rating1" name="rating" value="1" required>
                        <label for="rating1"><span class="star">☆</span> 1</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating2" name="rating" value="2" required>
                        <label for="rating2"><span class="star">☆</span> 2</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating3" name="rating" value="3" required>
                        <label for="rating3"><span class="star">☆</span> 3</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating4" name="rating" value="4" required>
                        <label for="rating4"><span class="star">☆</span> 4</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating5" name="rating" value="5" required>
                        <label for="rating5"><span class="star">☆</span> 5</label>
                    </div>
                </div>
            </div>

            <!-- Date of Installation -->
            <div class="form-group">
                <label for="installDate">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <!-- Useful Features - EACH checkbox now has a unique ID and its own label -->
            <div class="form-group">
                <label class="checkbox-group-label">Useful Features</label>
                <div class="checkbox-group">
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature1" name="features" value="Easy to install">
                        <label for="feature1">Easy to install</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature2" name="features" value="Good documentation">
                        <label for="feature2">Good documentation</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature3" name="features" value="Great support">
                        <label for="feature3">Great support</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature4" name="features" value="Works as advertised">
                        <label for="feature4">Works as advertised</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature5" name="features" value="Good value for money">
                        <label for="feature5">Good value for money</label>
                    </div>
                </div>
            </div>

            <!-- Written Review -->
            <div class="form-group">
                <label for="writtenReview">Written Review</label>
                <textarea id="writtenReview" name="writtenReview" rows="5" placeholder="Tell us more about your experience with this product..."></textarea>
            </div>

            <!-- User Name -->
            <div class="form-group">
                <label for="userName">User Name</label>
                <input type="text" id="userName" name="userName" placeholder="Your name (optional)">
            </div>

            <!-- Submit Button -->
            <div class="form-group">
                <button type="submit" class="submit-btn">Submit Review</button>
            </div>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Aaron Morris | Product Review Form</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
